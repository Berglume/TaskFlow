<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow is a simple task manager built with HTML, CSS, and JavaScript." />
  <title>TaskFlow | JavaScript Task Manager</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <main class="app">
    <section class="panel" aria-labelledby="app-title">
      <div class="header">
        <div>
          <p class="eyebrow">TaskFlow</p>
          <h1 id="app-title">Plan your day</h1>
        </div>
        <p class="counter" id="taskCounter">0 active</p>
      </div>

      <form class="task-form" id="taskForm">
        <label class="sr-only" for="taskInput">New task</label>
        <input id="taskInput" type="text" placeholder="Add a task..." autocomplete="off" />
        <button type="submit">Add</button>
      </form>

      <div class="filters" aria-label="Task filters">
        <button class="filter is-active" type="button" data-filter="all">All</button>
        <button class="filter" type="button" data-filter="active">Active</button>
        <button class="filter" type="button" data-filter="done">Done</button>
      </div>

      <ul class="task-list" id="taskList" aria-label="Tasks"></ul>

      <div class="empty-state" id="emptyState">
        <h2>No tasks yet</h2>
        <p>Add your first task and keep the day moving.</p>
      </div>
    </section>
  </main>
</body>
</html>
